services:
  - type: web
    name: onestep-hub
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: npm install --prefix backend && npm install --prefix frontend --production=false && npm run build --prefix frontend
    startCommand: node backend/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: "true"
      - key: DB_DIALECT
        value: mysql
      - key: SYNC_ALTER
        value: "true"
      - key: VITE_API_URL
        value: ""
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_ENABLE_MOCK
        value: "true"
      - key: STORE_DISPLAY_NAME
        value: OneStep Hub
