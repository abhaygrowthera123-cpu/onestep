services:
  - type: web
    name: onestep-hub
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    disk:
      name: onestep-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: "true"
      - key: DB_DIALECT
        value: sqlite
      - key: SYNC_ALTER
        value: "false"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: STORE_DISPLAY_NAME
        value: OneStep Hub
